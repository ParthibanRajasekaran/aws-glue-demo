name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pre-commit pytest boto3 "moto[s3,iam,dynamodb,ssm]>=5.0.0"

      - name: Lint (black, isort, ruff, detect-secrets)
        run: pre-commit run --all-files

      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short
